name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  s4c-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: s4c-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: s4c-web/package-lock.json

      - run: npm install

      - run: npm run lint
        continue-on-error: true

      - run: npm test

      - run: npm run build
