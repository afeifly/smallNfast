name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  s4c-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: s4c-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: s4c-web/package-lock.json

      - run: npm install

      - run: npm run lint
        continue-on-error: true

      - run: |
          set -o pipefail
          npm test -- --reporter=verbose --pool=forks 2>&1 | tee test-results.log
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: s4c-web/test-results.log

      - run: npm run build
